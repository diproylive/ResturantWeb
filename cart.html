<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Food Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-utensils"></i> Food Express</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item dropdown ms-3">
                        <a class="nav-link dropdown-toggle d-flex align-items-center justify-content-center" href="#"
                            id="settingsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false"
                            title="Settings"
                            style="width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                            <i class="fas fa-cog"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="settingsDropdown">
                            <li>
                                <button class="dropdown-item d-flex align-items-center gap-2" id="theme-toggle-btn"
                                    onclick="setTimeout(toggleTheme, 0)">
                                    <i id="theme-icon" class="fas fa-moon"></i> Toggle Theme
                                </button>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <button class="dropdown-item d-flex align-items-center gap-2"
                                    onclick="openAdminLogin()">
                                    <i class="fas fa-user-shield"></i> Admin Login
                                </button>
                            </li>
                        </ul>
                    </li>
                    <li class="nav-item ms-3">
                        <a class="btn btn-primary position-relative d-flex align-items-center gap-2" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span id="cart-badge"
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <section class="container py-5">
        <h2 class="fw-bold mb-4">Your Cart</h2>

        <div class="row" id="cart-content">
            <div class="col-lg-8" id="cart-items-container">
                <!-- Cart items rendered by js -->
            </div>

            <div class="col-lg-4 mt-4 mt-lg-0" id="cart-summary-container">
                <div class="card p-4 shadow-sm border-0 bg-body-tertiary rounded-4">
                    <h4 class="fw-bold mb-4">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted" id="tax-label">Tax</span>
                        <span class="fw-bold" id="cart-tax">₹0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 border-bottom pb-3">
                        <span class="text-muted" id="delivery-label">Delivery Fee</span>
                        <span class="fw-bold" id="cart-delivery">₹0</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-bold fs-5">Total</span>
                        <span class="fw-bold fs-5 text-primary" id="total">₹0</span>
                    </div>

                    <h5 class="fw-bold mb-3 mt-4">Checkout Details</h5>
                    <form id="checkout-form">
                        <div class="mb-3 d-flex gap-3">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="orderType" id="typeDelivery" value="Delivery" checked onchange="toggleOrderType()">
                                <label class="form-check-label" for="typeDelivery">Delivery</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="orderType" id="typeDineIn" value="Dine-in" onchange="toggleOrderType()">
                                <label class="form-check-label" for="typeDineIn">Dine-in</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="customer-name" placeholder="Full Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="tel" class="form-control" id="customer-phone" placeholder="Phone Number" required pattern="[0-9]{10}">
                        </div>
                        <div class="mb-3" id="address-container">
                            <textarea class="form-control" id="customer-address" rows="3" placeholder="Delivery Address" required></textarea>
                        </div>
                        <div class="mb-3 d-none" id="table-container">
                            <input type="number" class="form-control" id="table-number" placeholder="Table Number" min="1">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Place Order</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="empty-cart-message" class="text-center py-5 d-none">
            <i class="fas fa-shopping-basket fa-4x text-muted mb-3"></i>
            <h3 class="text-muted">Your cart is empty</h3>
            <a href="menu.html" class="btn btn-primary mt-3">Browse Menu</a>
        </div>
    </section>

    <footer class="text-center mt-auto">
        <div class="container py-4 border-top">
            <p class="text-muted small mb-0">&copy; 2026 Food Express. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
