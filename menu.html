<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Food Express</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-utensils"></i> Food Express</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="orders.html">Orders</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    
                    <!-- Settings / Admin Login Dropdown -->
                    <li class="nav-item dropdown ms-3">
                        <a class="nav-link dropdown-toggle d-flex align-items-center justify-content-center" href="#" id="settingsDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false" title="Settings" style="width: 40px; height: 40px; border-radius: 50%; background: var(--card-bg); box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                            <i class="fas fa-cog"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="settingsDropdown">
                            <li>
                                <button class="dropdown-item d-flex align-items-center gap-2" id="theme-toggle-btn" onclick="setTimeout(toggleTheme, 0)">
                                    <i id="theme-icon" class="fas fa-moon"></i> Toggle Theme
                                </button>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <button class="dropdown-item d-flex align-items-center gap-2" onclick="openAdminLogin()">
                                    <i class="fas fa-user-shield"></i> Admin Login
                                </button>
                            </li>
                        </ul>
                    </li>
                    
                    <li class="nav-item ms-3">
                        <a class="btn btn-primary position-relative d-flex align-items-center gap-2" href="cart.html">
                            <i class="fas fa-shopping-cart"></i> Cart
                            <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Menu Header -->
    <section class="py-5 bg-primary text-white text-center" style="background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);">
        <div class="container fade-in-up">
            <h1 class="display-4 fw-bold">Our Menu</h1>
            <p class="lead mb-0">Discover our delicious offerings</p>
        </div>
    </section>

    <!-- Menu Items -->
    <section class="container py-5">
        
        <!-- Dynamic Categories -->
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5 fade-in-up delay-100" id="menu-categories">
            <!-- Categories will be rendered by menu.js -->
        </div>

        <div class="row g-4" id="menu-container">
            <!-- Menu items will be rendered here by menu.js -->
        </div>
    </section>

    <footer class="text-center mt-auto">
        <div class="container py-4 border-top">
            <p class="text-muted small mb-0">&copy; 2026 Food Express. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
